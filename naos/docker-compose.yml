version: '3.9'

services:
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  naos:
    build: .
    depends_on:
      redis:
        condition: service_healthy
    env_file: .env
    volumes:
      - ./naos-audit.ndjson:/app/naos-audit.ndjson
      - ./naos-improvements.json:/app/naos-improvements.json
    ports:
      - '3000:3000'
    restart: unless-stopped

volumes:
  redis_data:
